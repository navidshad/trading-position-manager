<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinEx Futures Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dark Theme (Default) */
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #38bdf8;
            --profit: #22c55e;
            --loss: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: blur(12px);
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.3);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --accent-color: #0284c7;
            --profit: #15803d;
            --loss: #dc2626;
            --border: rgba(0, 0, 0, 0.05);
            --shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding: 0 1rem;
        }

        .title-group h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .title-group p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-primary);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            backdrop-filter: var(--glass-blur);
            box-shadow: var(--shadow);
        }

        .theme-toggle:hover {
            transform: translateY(-2px);
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 99px;
            font-weight: 600;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        .dot.online { background: var(--profit); box-shadow: 0 0 10px var(--profit); }
        .dot.error { background: var(--loss); box-shadow: 0 0 10px var(--loss); }

        #container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 600px; /* Centered column width */
            margin: 0 auto;
        }

        .position-card {
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 1.5rem;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .pair-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .side-badge {
            font-size: 0.75rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .side-long { background: rgba(34, 197, 94, 0.1); color: var(--profit); }
        .side-short { background: rgba(239, 68, 68, 0.1); color: var(--loss); }

        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .pnl-section {
            grid-column: span 2;
            margin-top: 0.5rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .percentage {
            font-size: 2rem;
            font-weight: 700;
        }

        .dollar-pnl {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .value-profit { color: var(--profit); }
        .value-loss { color: var(--loss); }

        .update-flash {
            animation: flash 0.3s ease-in-out;
        }

        @keyframes flash {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #error-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .error-card {
            background: var(--card-bg);
            border: 1px solid var(--loss);
            padding: 2rem;
            border-radius: 24px;
            max-width: 500px;
        }

        .error-card h2 { color: var(--loss); margin-bottom: 1rem; }
        .error-card p { color: var(--text-secondary); line-height: 1.6; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem;
            color: var(--text-secondary);
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            body { padding: 1rem; }
            header { flex-direction: column; gap: 1rem; text-align: center; }
            .controls { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="error-overlay">
        <div class="error-card">
            <h2>API Error</h2>
            <div id="error-message">Please ensure your API keys are correctly configured at the top of the file.</div>
        </div>
    </div>

    <header>
        <div class="title-group">
            <h1>Futures Dashboard</h1>
            <p>Real-time Market Monitor</p>
        </div>
        <div class="controls">
            <div class="status-badge">
                <div id="status-dot" class="dot"></div>
                <span id="status-text">Disconnected</span>
            </div>
            <button class="theme-toggle" onclick="toggleTheme()">
                <span id="theme-icon">🌙</span> Dark Mode
            </button>
        </div>
    </header>

    <div id="container">
        <!-- Positions will be injected here -->
        <div class="empty-state">Waiting for data...</div>
    </div>

    <script>
        // --- COINEX API CONFIGURATION ---
        const UPDATE_INTERVAL = 2000; // ms
        const API_BASE = "/proxy";

        // State Management
        let positions = [];
        let theme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);

        function toggleTheme() {
            theme = theme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            updateThemeUI();
        }

        function updateThemeUI() {
            const btn = document.querySelector('.theme-toggle');
            const icon = document.getElementById('theme-icon');
            if (theme === 'light') {
                btn.innerHTML = '<span id="theme-icon">☀️</span> Light Mode';
            } else {
                btn.innerHTML = '<span id="theme-icon">🌙</span> Dark Mode';
            }
        }
        updateThemeUI();

        async function fetchPositions() {
            try {
                // 1. Fetch Positions via local proxy (Server handles signing)
                const posRes = await fetch(API_BASE + "/v2/futures/pending-position?market_type=FUTURES");
                if (!posRes.ok) throw new Error(`Positions HTTP ${posRes.status}`);
                const posData = await posRes.json();
                if (posData.code !== 0) throw new Error(posData.message);

                // 2. Fetch Tickers via local proxy (Server handles signing)
                let tickerMap = {};
                try {
                    const tickerRes = await fetch(API_BASE + "/v2/futures/ticker");
                    if (tickerRes.ok) {
                        const tData = await tickerRes.json();
                        if (tData.code === 0 && tData.data) {
                            tData.data.forEach(t => tickerMap[t.market] = t);
                        }
                    }
                } catch (e) { console.warn("Ticker fetch error:", e); }

                // Merge and Update UI
                const merged = (posData.data || []).map(pos => {
                    const t = tickerMap[pos.market];
                    if (t) pos.real_current_price = t.last;
                    return pos;
                });

                updateUI(merged);
                setStatus("online");
            } catch (err) {
                console.error(err);
                setStatus("error");
                showError("Fetch Error: " + err.message);
            }
        }

        function setStatus(status) {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            dot.className = 'dot ' + status;
            text.innerText = status.charAt(0).toUpperCase() + status.slice(1);
        }

        function showError(msg) {
            document.getElementById('error-overlay').style.display = 'flex';
            document.getElementById('error-message').innerText = msg;
        }

        function updateUI(newPositions) {
            const container = document.getElementById('container');
            
            if (newPositions.length === 0) {
                container.innerHTML = '<div class="empty-state">No open futures positions found.</div>';
                return;
            }

            // Remove empty state if it exists
            const emptyState = container.querySelector('.empty-state');
            if (emptyState) emptyState.remove();

            // Track current markets to identify removed positions
            const currentMarkets = new Set(newPositions.map(p => p.market));
            
            // Remove cards for closed positions
            const existingCards = container.querySelectorAll('.position-card');
            existingCards.forEach(card => {
                const market = card.id.replace('card-', '');
                if (!currentMarkets.has(market)) {
                    card.remove();
                }
            });

            newPositions.forEach(pos => {
                const cardId = `card-${pos.market}`;
                let card = document.getElementById(cardId);
                
                const entryPrice = parseFloat(pos.avg_entry_price);
                const currentPriceVal = pos.real_current_price 
                    ? parseFloat(pos.real_current_price) 
                    : parseFloat(pos.settle_price);
                
                const leverage = parseFloat(pos.leverage);
                const sideMultiplier = pos.side === 'long' ? 1 : -1;

                // Manual ROI Calculation: ((Current - Entry) / Entry) * Side * Leverage * 100
                const calculatedRoi = ((currentPriceVal - entryPrice) / entryPrice) * sideMultiplier * leverage * 100;
                
                const pnl = parseFloat(pos.unrealized_pnl);
                const pnlClass = calculatedRoi >= 0 ? 'value-profit' : 'value-loss';
                const percentage = calculatedRoi.toFixed(2);
                
                const currentPriceDisplay = currentPriceVal.toLocaleString();
                const breakEvenDisplay = entryPrice.toLocaleString();
                const dollarPnl = `${pnl >= 0 ? '+' : ''}${pnl.toLocaleString()} USD`;
                const roiText = `${calculatedRoi >= 0 ? '+' : ''}${percentage}%`;

                if (!card) {
                    // Create new card
                    const cardHtml = `
                        <div class="position-card" id="${cardId}">
                            <div class="card-header">
                                <div class="pair-title">${pos.market}</div>
                                <div class="side-badge ${pos.side === 'long' ? 'side-long' : 'side-short'}">${pos.side} ${pos.leverage}x</div>
                            </div>
                            <div class="stat-grid">
                                <div class="stat-item">
                                    <span class="stat-label">Current Price</span>
                                    <span class="stat-value" data-field="price">${currentPriceDisplay}</span>
                                </div>
                                <div class="stat-item">
                                    <span class="stat-label">Break Even</span>
                                    <span class="stat-value" data-field="breakeven">${breakEvenDisplay}</span>
                                </div>
                                <div class="pnl-section">
                                    <div class="stat-item">
                                        <span class="stat-label">ROI %</span>
                                        <div class="percentage ${pnlClass}" data-field="roi">${roiText}</div>
                                    </div>
                                    <div class="stat-item" style="text-align: right;">
                                        <span class="stat-label">Unrealized PNL</span>
                                        <div class="dollar-pnl ${pnlClass}" data-field="pnl">${dollarPnl}</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.insertAdjacentHTML('beforeend', cardHtml);
                } else {
                    // Update existing card surgically
                    updateElement(card.querySelector('[data-field="price"]'), currentPriceDisplay);
                    updateElement(card.querySelector('[data-field="breakeven"]'), breakEvenDisplay);
                    
                    const roiEl = card.querySelector('[data-field="roi"]');
                    roiEl.className = `percentage ${pnlClass}`;
                    updateElement(roiEl, roiText);
                    
                    const pnlEl = card.querySelector('[data-field="pnl"]');
                    pnlEl.className = `dollar-pnl ${pnlClass}`;
                    updateElement(pnlEl, dollarPnl);
                }
            });
        }

        function updateElement(el, newValue) {
            if (el.innerText !== newValue) {
                el.innerText = newValue;
                el.classList.remove('update-flash');
                void el.offsetWidth; // Trigger reflow
                el.classList.add('update-flash');
            }
        }

        // Start Polling
        fetchPositions();
        setInterval(fetchPositions, UPDATE_INTERVAL);
    </script>
</body>
</html>
